<svg xmlns="http://www.w3.org/2000/svg" width="980" height="360" viewBox="0 0 980 360" font-family="Helvetica, Arial, sans-serif">
  <rect width="980" height="360" fill="#ffffff"/>
  <defs>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#5A5A5A"/>
    </marker>
  </defs>

  <!-- Sensors -->
  <rect x="30" y="70" width="140" height="54" rx="3" fill="#F7F7F7" stroke="#4A4A4A" stroke-width="1.3"/>
  <text x="100" y="93" font-size="13" font-weight="600" text-anchor="middle" fill="#1A1A1A">TMP117</text>
  <text x="100" y="111" font-size="10.5" text-anchor="middle" fill="#555">კანის ტემპერატურა</text>

  <rect x="30" y="156" width="140" height="54" rx="3" fill="#F7F7F7" stroke="#4A4A4A" stroke-width="1.3"/>
  <text x="100" y="179" font-size="13" font-weight="600" text-anchor="middle" fill="#1A1A1A">MAX30102</text>
  <text x="100" y="197" font-size="10.5" text-anchor="middle" fill="#555">პულსი (BPM)</text>

  <!-- XIAO -->
  <rect x="265" y="92" width="170" height="100" rx="3" fill="#ECF1F6" stroke="#2A4A6B" stroke-width="1.6"/>
  <text x="350" y="122" font-size="13.5" font-weight="600" text-anchor="middle" fill="#1A2A3A">XIAO ESP32-C3</text>
  <line x1="285" y1="132" x2="415" y2="132" stroke="#B8C4D0" stroke-width="0.8"/>
  <text x="350" y="150" font-size="10" text-anchor="middle" fill="#555">სენსორების წაკითხვა</text>
  <text x="350" y="166" font-size="10" text-anchor="middle" fill="#555">BPM ალგორითმი</text>
  <text x="350" y="182" font-size="10" text-anchor="middle" fill="#555">BLE სერვერი</text>

  <!-- DevKit -->
  <rect x="545" y="80" width="190" height="124" rx="3" fill="#ECF1F6" stroke="#2A4A6B" stroke-width="1.6"/>
  <text x="640" y="108" font-size="13.5" font-weight="600" text-anchor="middle" fill="#1A2A3A">ESP32 DevKit V1</text>
  <line x1="565" y1="118" x2="715" y2="118" stroke="#B8C4D0" stroke-width="0.8"/>
  <text x="640" y="136" font-size="10" text-anchor="middle" fill="#555">BLE კლიენტი</text>
  <text x="640" y="152" font-size="10" text-anchor="middle" fill="#555">მონაცემთა ანალიზი</text>
  <text x="640" y="168" font-size="10" text-anchor="middle" fill="#555">გადაწყვეტის ლოგიკა</text>
  <text x="640" y="184" font-size="10" text-anchor="middle" fill="#555">Wi-Fi AP / ვებ-სერვერი</text>

  <!-- Simulator -->
  <rect x="825" y="92" width="130" height="100" rx="3" fill="#F7F7F7" stroke="#4A4A4A" stroke-width="1.3"/>
  <text x="890" y="130" font-size="12.5" font-weight="600" text-anchor="middle" fill="#1A1A1A">ვებ-სიმულატორი</text>
  <text x="890" y="156" font-size="10" text-anchor="middle" fill="#555">კონდიციონერი</text>
  <text x="890" y="172" font-size="10" text-anchor="middle" fill="#555">(ბრაუზერი)</text>

  <!-- Arrows -->
  <line x1="170" y1="97" x2="263" y2="125" stroke="#5A5A5A" stroke-width="1.3" marker-end="url(#arr)"/>
  <line x1="170" y1="183" x2="263" y2="158" stroke="#5A5A5A" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="205" y="128" font-size="9.5" fill="#777">I2C</text>

  <line x1="435" y1="142" x2="543" y2="142" stroke="#5A5A5A" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="468" y="135" font-size="9.5" fill="#777">BLE</text>

  <line x1="735" y1="142" x2="823" y2="142" stroke="#5A5A5A" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="752" y="135" font-size="9.5" fill="#777">Wi-Fi / HTTP</text>
</svg>
