<svg xmlns="http://www.w3.org/2000/svg" width="760" height="480" viewBox="0 0 760 480" font-family="Helvetica, Arial, sans-serif">
  <rect width="760" height="480" fill="#ffffff"/>

  <!-- board -->
  <rect x="120" y="60" width="520" height="360" rx="6" fill="#15613A" stroke="#0C3F25" stroke-width="2"/>
  <rect x="120" y="60" width="520" height="360" rx="6" fill="none" stroke="#2E8B57" stroke-width="0.6" opacity="0.5"/>
  <text x="380" y="84" font-size="11" fill="#BFE6CF" text-anchor="middle">სენსორული დაფა — 50 × 38 mm (კონცეფცია)</text>

  <!-- silkscreen border -->
  <rect x="135" y="95" width="490" height="305" rx="3" fill="none" stroke="#5FB88A" stroke-width="0.7" stroke-dasharray="3 2" opacity="0.6"/>

  <!-- XIAO footprint -->
  <rect x="300" y="150" width="160" height="86" rx="2" fill="#0F4A2C" stroke="#BFE6CF" stroke-width="1.1"/>
  <text x="380" y="197" font-size="11" fill="#E5F5EC" text-anchor="middle">XIAO ESP32-C3</text>
  <g fill="#C9A227">
    <rect x="297" y="158" width="7" height="9"/><rect x="297" y="174" width="7" height="9"/>
    <rect x="297" y="190" width="7" height="9"/><rect x="297" y="206" width="7" height="9"/>
    <rect x="456" y="158" width="7" height="9"/><rect x="456" y="174" width="7" height="9"/>
    <rect x="456" y="190" width="7" height="9"/><rect x="456" y="206" width="7" height="9"/>
  </g>

  <!-- TMP117 -->
  <rect x="165" y="160" width="86" height="56" rx="2" fill="#0F4A2C" stroke="#BFE6CF" stroke-width="1.1"/>
  <text x="208" y="192" font-size="10" fill="#E5F5EC" text-anchor="middle">TMP117</text>
  <g fill="#C9A227"><rect x="161" y="170" width="6" height="7"/><rect x="161" y="184" width="6" height="7"/><rect x="161" y="198" width="6" height="7"/></g>

  <!-- MAX30102 -->
  <rect x="165" y="300" width="86" height="56" rx="2" fill="#0F4A2C" stroke="#BFE6CF" stroke-width="1.1"/>
  <text x="208" y="332" font-size="10" fill="#E5F5EC" text-anchor="middle">MAX30102</text>
  <g fill="#C9A227"><rect x="161" y="310" width="6" height="7"/><rect x="161" y="324" width="6" height="7"/><rect x="161" y="338" width="6" height="7"/></g>

  <!-- USB-C -->
  <rect x="512" y="172" width="78" height="44" rx="2" fill="#0F4A2C" stroke="#BFE6CF" stroke-width="1.1"/>
  <text x="551" y="198" font-size="9.5" fill="#E5F5EC" text-anchor="middle">USB-C</text>

  <!-- copper traces -->
  <g stroke="#C9A227" stroke-width="1.6" fill="none" opacity="0.92">
    <path d="M251,174 L300,174"/>
    <path d="M251,190 L300,190"/>
    <path d="M251,324 L278,324 L278,206 L300,206"/>
    <path d="M251,310 L288,310 L288,190"/>
    <path d="M460,186 L512,186"/>
  </g>

  <!-- decoupling caps -->
  <g fill="#8A8A8A"><rect x="276" y="258" width="13" height="7" rx="1"/><rect x="304" y="258" width="13" height="7" rx="1"/></g>
  <text x="324" y="265" font-size="8.5" fill="#BFE6CF">100 nF decoupling</text>

  <!-- mounting holes -->
  <circle cx="142" cy="82" r="6.5" fill="#0C3F25" stroke="#9FCFB4" stroke-width="1"/>
  <circle cx="618" cy="82" r="6.5" fill="#0C3F25" stroke="#9FCFB4" stroke-width="1"/>
  <circle cx="142" cy="398" r="6.5" fill="#0C3F25" stroke="#9FCFB4" stroke-width="1"/>
  <circle cx="618" cy="398" r="6.5" fill="#0C3F25" stroke="#9FCFB4" stroke-width="1"/>

  <text x="380" y="452" font-size="10" fill="#777" text-anchor="middle">შენიშვნა: ეს არის კონცეპtuli განლაგება. მომუშავე პროტოტიპი აწყობილია dev-დაფებსა და breadboard-ზე.</text>
</svg>
